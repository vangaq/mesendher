<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Фото + текст</title>
  <link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>
  <main class="page">
    <section class="chat-card">
      <div class="header">
        <div>
          <h1>Общий чат</h1>
          <p>Текст, фото, Ctrl+V из буфера обмена</p>
        </div>
        <button id="refreshBtn" class="secondary">Обновить</button>
      </div>

      <div id="messages" class="messages"></div>

      <div id="preview" class="preview hidden">
        <div class="preview-top">
          <strong>Фото готово к отправке</strong>
          <button id="clearImageBtn" class="link-btn">убрать</button>
        </div>
        <img id="previewImg" alt="preview">
      </div>

      <form id="sendForm" class="composer">
        <textarea id="textInput" placeholder="Введите текст. Фото можно вставить через Ctrl+V." rows="3"></textarea>
        <div class="actions">
          <label class="file-label">
            Выбрать фото
            <input id="fileInput" type="file" accept="image/*">
          </label>
          <button type="submit">Отправить</button>
        </div>
      </form>

      <div id="status" class="status"></div>
    </section>
  </main>

  <script src="/static/app.js?v=7"></script>
</body>
</html>
